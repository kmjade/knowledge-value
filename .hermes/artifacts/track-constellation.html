<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履迹星图 — Track Constellation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh; color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 13px; margin-bottom: 32px; line-height: 1.5; }
        .control-section { margin-bottom: 28px; }
        .control-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .control-group { margin-bottom: 14px; }
        .control-group label { display: block; font-size: 11px; font-weight: 500; color: var(--anthropic-mid-gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .slider-row { display: flex; align-items: center; gap: 10px; }
        .slider-row input[type="range"] { flex: 1; -webkit-appearance: none; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; }
        .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-dark); border-radius: 50%; cursor: pointer; }
        .value-display { font-size: 12px; font-weight: 500; min-width: 38px; text-align: right; }
        .seed-display { font-family: 'Lora', serif; font-size: 30px; font-weight: 500; margin-bottom: 10px; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .btn {
            padding: 8px 14px; border: 1px solid var(--anthropic-light-gray);
            background: white; border-radius: 6px; font-family: 'Poppins', sans-serif;
            font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--anthropic-dark);
        }
        .btn:hover { background: var(--anthropic-light-gray); }
        .btn.primary { background: var(--anthropic-dark); color: white; border-color: var(--anthropic-dark); }
        .btn.primary:hover { opacity: 0.9; }
        .btn.full-width { grid-column: 1 / -1; width: 100%; }
        .seed-input-row { display: flex; gap: 8px; }
        .seed-input-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--anthropic-light-gray); border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 12px; outline: none; }
        .seed-input-row input:focus { border-color: var(--anthropic-dark); }
        .main-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-radius: 12px; box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow: hidden; min-width: 0;
        }
        .main-content canvas { display: block; max-width: 100%; max-height: 100%; border-radius: 8px; }
        @media (max-width: 900px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>履迹星图</h1>
            <div class="subtitle">Track Constellation — 粒子追随隐形力场，在画布上留下探索的星图。每个 seed 生成独一无二的运动化石。</div>

            <div class="control-section">
                <h3>🎲 种子 Seed</h3>
                <div class="seed-display" id="seed-display">0001</div>
                <div class="seed-controls">
                    <button class="btn" onclick="prevSeed()">← Prev</button>
                    <button class="btn" onclick="nextSeed()">Next →</button>
                    <button class="btn full-width" onclick="randomSeed()">🎲 Random</button>
                </div>
                <div class="seed-input-row">
                    <input type="number" id="seed-input" placeholder="Jump to seed..." value="1" min="1" max="9999">
                    <button class="btn" onclick="jumpToSeed()">Go</button>
                </div>
            </div>

            <div class="control-section">
                <h3>⚙️ 参数 Parameters</h3>
                <div class="control-group">
                    <label>粒子数量 Particles</label>
                    <div class="slider-row">
                        <input type="range" id="particleCount" min="200" max="3000" step="50" value="800" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">800</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>噪声尺度 Noise Scale</label>
                    <div class="slider-row">
                        <input type="range" id="noiseScale" min="0.001" max="0.015" step="0.0005" value="0.004" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.004</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>粒子寿命 Lifespan</label>
                    <div class="slider-row">
                        <input type="range" id="lifespan" min="100" max="800" step="25" value="350" oninput="updateParam('lifespan', this.value)">
                        <span class="value-display" id="lifespan-value">350</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>速度阻尼 Speed Damping</label>
                    <div class="slider-row">
                        <input type="range" id="damping" min="0.90" max="0.995" step="0.005" value="0.97" oninput="updateParam('damping', this.value)">
                        <span class="value-display" id="damping-value">0.97</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>尾迹不透明度 Trail Opacity</label>
                    <div class="slider-row">
                        <input type="range" id="trailAlpha" min="2" max="25" step="1" value="8" oninput="updateParam('trailAlpha', this.value)">
                        <span class="value-display" id="trailAlpha-value">8</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>⚡ Actions</h3>
                <button class="btn primary full-width" onclick="regenerate()" style="margin-bottom:8px;">🔄 重新生成 Regenerate</button>
                <button class="btn full-width" onclick="resetParams()" style="margin-bottom:8px;">↺ 重置 Reset</button>
                <button class="btn full-width" onclick="downloadPNG()">⬇ 下载 PNG</button>
            </div>
        </div>
        <div class="main-content" id="canvas-container"></div>
    </div>

    <script>
        // ============================================
        // 履迹星图 Track Constellation
        // Generated art: particles following invisible
        // noise-field terrain, leaving density trails
        // ============================================

        let params = {
            seed: 1,
            particleCount: 800,
            noiseScale: 0.004,
            lifespan: 350,
            damping: 0.97,
            trailAlpha: 8
        };

        let defaults = { ...params };

        // --- Seed Management ---
        function updateSeed(newSeed) {
            params.seed = newSeed;
            document.getElementById('seed-display').textContent = String(newSeed).padStart(4, '0');
            document.getElementById('seed-input').value = newSeed;
            if (window.regenerateArt) regenerateArt();
        }

        function prevSeed() { updateSeed(Math.max(1, params.seed - 1)); }
        function nextSeed() { updateSeed(Math.min(9999, params.seed + 1)); }
        function randomSeed() { updateSeed(Math.floor(Math.random() * 9999) + 1); }
        function jumpToSeed() {
            const val = parseInt(document.getElementById('seed-input').value);
            if (val >= 1 && val <= 9999) updateSeed(val);
        }
        function regenerate() { if (window.regenerateArt) regenerateArt(); }
        function resetParams() {
            params = { ...defaults };
            Object.keys(params).forEach(k => {
                const el = document.getElementById(k);
                if (el) el.value = params[k];
                const disp = document.getElementById(k + '-value');
                if (disp) disp.textContent = params[k];
            });
            updateSeed(1);
            if (window.regenerateArt) regenerateArt();
        }
        function updateParam(name, value) {
            const numVal = parseFloat(value);
            params[name] = numVal;
            const display = document.getElementById(name + '-value');
            if (display) display.textContent = numVal;
            if (window.regenerateArt) regenerateArt();
        }
        function downloadPNG() {
            saveCanvas('track-constellation-seed-' + String(params.seed).padStart(4, '0'), 'png');
        }

        // --- p5.js Sketch ---
        new p5((p) => {
            let particles = [];
            let trailBuffer;

            p.setup = function() {
                const container = document.getElementById('canvas-container');
                const size = Math.min(container.offsetWidth - 40, container.offsetHeight - 40, 800);
                const canvas = p.createCanvas(size, size);
                canvas.parent('canvas-container');
                p.colorMode(p.HSB, 360, 100, 100, 100);
                trailBuffer = p.createGraphics(size, size);
                trailBuffer.colorMode(p.HSB, 360, 100, 100, 100);
                p.noLoop();
                regenerateArt();
            };

            function regenerateArt() {
                p.randomSeed(params.seed);
                p.noiseSeed(params.seed);

                // Reset
                p.clear();
                trailBuffer.clear();
                trailBuffer.background(0, 0, 0, 0);
                particles = [];

                // Determine edge spawn zones
                const margin = 20;

                // Spawn particles at edges
                for (let i = 0; i < params.particleCount; i++) {
                    let x, y, vx, vy;

                    // Random edge spawn
                    const edge = p.floor(p.random(4));
                    switch(edge) {
                        case 0: x = p.random(margin, p.width - margin); y = margin; break;      // top
                        case 1: x = p.random(margin, p.width - margin); y = p.height - margin; break; // bottom
                        case 2: x = margin; y = p.random(margin, p.height - margin); break;      // left
                        case 3: x = p.width - margin; y = p.random(margin, p.height - margin); break; // right
                    }

                    // Initial velocity towards center-ish
                    const angle = p.atan2(p.height/2 - y, p.width/2 - x) + p.random(-0.8, 0.8);
                    const speed = p.random(0.5, 2.0);
                    vx = p.cos(angle) * speed;
                    vy = p.sin(angle) * speed;

                    particles.push({
                        x, y, vx, vy,
                        age: 0,
                        maxAge: params.lifespan + p.floor(p.random(-50, 100)),
                        hue: 0, sat: 0, bri: 0
                    });
                }

                // Simulate all particles
                for (let step = 0; step < params.lifespan + 100; step++) {
                    let activeCount = 0;
                    for (let pt of particles) {
                        if (pt.age >= pt.maxAge) continue;
                        if (pt.x < -10 || pt.x > p.width + 10 || pt.y < -10 || pt.y > p.height + 10) {
                            pt.age = pt.maxAge;
                            continue;
                        }
                        activeCount++;

                        // Multi-octave noise for flow field
                        const angle = p.noise(pt.x * params.noiseScale, pt.y * params.noiseScale, 0.5) * p.TWO_PI * 2;
                        const forceX = p.cos(angle) * 0.3;
                        const forceY = p.sin(angle) * 0.3;

                        // Add subtle terrain repulsion (invisible hills)
                        const terrain = p.noise(pt.x * params.noiseScale * 0.5, pt.y * params.noiseScale * 0.5, 1.5);
                        const repulsion = (terrain - 0.5) * 0.15;

                        pt.vx += forceX + p.cos(repulsion * 10) * repulsion;
                        pt.vy += forceY + p.sin(repulsion * 10) * repulsion;
                        pt.vx *= params.damping;
                        pt.vy *= params.damping;

                        // Clamp speed
                        const spd = p.sqrt(pt.vx * pt.vx + pt.vy * pt.vy);
                        if (spd > 3) { pt.vx *= 3/spd; pt.vy *= 3/spd; }
                        if (spd < 0.1) { pt.vx = (pt.vx/spd) * 0.1; pt.vy = (pt.vy/spd) * 0.1; }

                        const prevX = pt.x;
                        const prevY = pt.y;
                        pt.x += pt.vx;
                        pt.y += pt.vy;

                        // Color from speed (warm=fast, cool=slow)
                        const hue = p.map(spd, 0.1, 2.5, 210, 25); // blue→orange
                        const sat = p.map(spd, 0.1, 2.5, 30, 75);
                        const bri = p.map(spd, 0.1, 2.5, 40, 85);

                        // Draw trail segment
                        trailBuffer.strokeWeight(p.map(spd, 0.1, 2.5, 0.3, 1.5));
                        trailBuffer.stroke(hue, sat, bri, params.trailAlpha);
                        trailBuffer.line(prevX, prevY, pt.x, pt.y);

                        pt.age++;
                    }
                    if (activeCount === 0) break;
                }

                // Render trail buffer to main canvas
                p.background(250, 249, 245);
                p.image(trailBuffer, 0, 0);
            }

            window.regenerateArt = regenerateArt;
            window.resetArt = function() { regenerateArt(); };

            p.keyPressed = function() {
                if (p.key === 's' || p.key === 'S') downloadPNG();
            };
        });
    </script>
</body>
</html>
