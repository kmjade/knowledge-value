<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographic Drift — Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh; color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input { width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center; }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20,20,19,0.1); background: white; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h1>Cartographic Drift</h1>
        <div class="subtitle">制图漂移 — 传感器代理在隐形地形中探索，积累密度形成概率地图。每次种子生成一次独特的探索旅程。</div>

        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="29337" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← Prev</button>
                <button class="button secondary" onclick="nextSeed()">Next →</button>
            </div>
            <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
        </div>

        <div class="control-section">
            <h3>Parameters</h3>
            <div class="control-group">
                <label>Sensor Rays</label>
                <div class="slider-container">
                    <input type="range" id="sensorRays" min="8" max="120" step="4" value="48" oninput="updateParam('sensorRays', this.value)">
                    <span class="value-display" id="sensorRays-value">48</span>
                </div>
            </div>
            <div class="control-group">
                <label>Sensor Range</label>
                <div class="slider-container">
                    <input type="range" id="sensorRange" min="30" max="300" step="10" value="150" oninput="updateParam('sensorRange', this.value)">
                    <span class="value-display" id="sensorRange-value">150</span>
                </div>
            </div>
            <div class="control-group">
                <label>Scan Angle</label>
                <div class="slider-container">
                    <input type="range" id="scanAngle" min="30" max="360" step="10" value="270" oninput="updateParam('scanAngle', this.value)">
                    <span class="value-display" id="scanAngle-value">270°</span>
                </div>
            </div>
            <div class="control-group">
                <label>Terrain Complexity</label>
                <div class="slider-container">
                    <input type="range" id="terrainComplexity" min="1" max="10" step="1" value="5" oninput="updateParam('terrainComplexity', this.value)">
                    <span class="value-display" id="terrainComplexity-value">5</span>
                </div>
            </div>
            <div class="control-group">
                <label>Agent Speed</label>
                <div class="slider-container">
                    <input type="range" id="agentSpeed" min="0.3" max="3.0" step="0.1" value="1.2" oninput="updateParam('agentSpeed', this.value)">
                    <span class="value-display" id="agentSpeed-value">1.2</span>
                </div>
            </div>
            <div class="control-group">
                <label>Trail Opacity</label>
                <div class="slider-container">
                    <input type="range" id="trailOpacity" min="2" max="30" step="1" value="8" oninput="updateParam('trailOpacity', this.value)">
                    <span class="value-display" id="trailOpacity-value">8</span>
                </div>
            </div>
            <div class="control-group">
                <label>Explore Frames</label>
                <div class="slider-container">
                    <input type="range" id="totalFrames" min="200" max="3000" step="100" value="1200" oninput="updateParam('totalFrames', this.value)">
                    <span class="value-display" id="totalFrames-value">1200</span>
                </div>
            </div>
        </div>

        <div class="control-section">
            <h3>Colors</h3>
            <div class="color-group">
                <label>Scan Trace</label>
                <div class="color-picker-container">
                    <input type="color" id="color1" value="#d97757" onchange="updateColor('color1', this.value)">
                    <span class="color-value" id="color1-value">#d97757</span>
                </div>
            </div>
            <div class="color-group">
                <label>Obstacle Hit</label>
                <div class="color-picker-container">
                    <input type="color" id="color2" value="#6a9bcc" onchange="updateColor('color2', this.value)">
                    <span class="color-value" id="color2-value">#6a9bcc</span>
                </div>
            </div>
            <div class="color-group">
                <label>Agent Trail</label>
                <div class="color-picker-container">
                    <input type="color" id="color3" value="#788c5d" onchange="updateColor('color3', this.value)">
                    <span class="color-value" id="color3-value">#788c5d</span>
                </div>
            </div>
        </div>

        <div class="control-section">
            <h3>Actions</h3>
            <div class="button-row">
                <button class="button" onclick="resetParameters()">Reset</button>
                <button class="button secondary" onclick="downloadPNG()">Download PNG</button>
            </div>
        </div>
    </div>

    <div class="canvas-area">
        <div id="canvas-container"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// CARTOGRAPHIC DRIFT — Parametric Generative Art
// ═══════════════════════════════════════════════════════════════════════

let params = {
    seed: 29337,
    sensorRays: 48,
    sensorRange: 150,
    scanAngle: 270,
    terrainComplexity: 5,
    agentSpeed: 1.2,
    trailOpacity: 8,
    totalFrames: 1200,
    colorPalette: ['#d97757', '#6a9bcc', '#788c5d']
};

let defaultParams = {};
let agent;
let densityMap;
let frameCountTotal = 0;
let finished = false;

function setup() {
    let canvas = createCanvas(1000, 1000);
    canvas.parent('canvas-container');
    defaultParams = JSON.parse(JSON.stringify(params));
    initSystem();
}

function initSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);

    // Density accumulation buffer
    densityMap = [];
    for (let i = 0; i < width; i++) {
        densityMap[i] = [];
        for (let j = 0; j < height; j++) {
            densityMap[i][j] = 0;
        }
    }

    // Agent starts at center with random heading
    agent = {
        x: width / 2 + random(-100, 100),
        y: height / 2 + random(-100, 100),
        heading: random(TWO_PI),
        trail: [],
        stuckTimer: 0,
        lastDensity: 0,
        sameSpotCount: 0
    };

    frameCountTotal = 0;
    finished = false;

    background(250, 249, 245);
    strokeWeight(1);
}

function draw() {
    if (finished) return;
    if (frameCountTotal >= params.totalFrames) {
        finished = true;
        return;
    }

    frameCountTotal++;

    // ── Perception: cast sensor rays ──
    let rays = params.sensorRays;
    let halfAngle = radians(params.scanAngle) / 2;
    let hits = [];

    for (let i = 0; i < rays; i++) {
        let angle = agent.heading - halfAngle + (radians(params.scanAngle) * i / (rays - 1));
        let hitPoint = castRay(agent.x, agent.y, angle, params.sensorRange);
        if (hitPoint) hits.push(hitPoint);
    }

    // ── Accumulation: draw hit points and scan lines onto canvas ──
    let scanColor = hexToRgba(params.colorPalette[0], params.trailOpacity / 255);
    let hitColor = hexToRgba(params.colorPalette[1], params.trailOpacity * 0.7 / 255);

    // Draw faint scan lines
    stroke(scanColor);
    for (let hit of hits) {
        let d = dist(agent.x, agent.y, hit.x, hit.y);
        let alpha = map(d, 0, params.sensorRange, params.trailOpacity * 0.8, params.trailOpacity * 0.15);
        stroke(hexToRgba(params.colorPalette[0], alpha / 255));
        line(agent.x, agent.y, hit.x, hit.y);

        // Draw hit point
        let hitAlpha = map(d, 0, params.sensorRange, params.trailOpacity * 1.2, params.trailOpacity * 0.3);
        stroke(hexToRgba(params.colorPalette[1], hitAlpha / 255));
        strokeWeight(1.5);
        point(hit.x, hit.y);
        strokeWeight(1);

        // Accumulate density at hit location
        let ix = constrain(floor(hit.x), 0, width - 1);
        let iy = constrain(floor(hit.y), 0, height - 1);
        densityMap[ix][iy] += params.trailOpacity * 0.04;
    }

    // ── Agent trail ──
    let trailColor = hexToRgba(params.colorPalette[2], params.trailOpacity * 1.5 / 255);
    stroke(trailColor);
    strokeWeight(2);
    // Draw trail segments
    if (agent.trail.length > 1) {
        for (let t = 1; t < agent.trail.length; t++) {
            let ta = map(t, 0, agent.trail.length, 0.3, 1.0);
            stroke(hexToRgba(params.colorPalette[2], ta * params.trailOpacity * 1.2 / 255));
            line(agent.trail[t-1].x, agent.trail[t-1].y, agent.trail[t].x, agent.trail[t].y);
        }
    }
    strokeWeight(1);

    // Draw agent position
    noStroke();
    let agentColor = hexToRgba(params.colorPalette[2], 0.7);
    fill(agentColor);
    ellipse(agent.x, agent.y, 5, 5);

    // ── Motion: gradient descent on density map toward unexplored areas ──
    agent.trail.push({x: agent.x, y: agent.y});
    if (agent.trail.length > 200) agent.trail.shift();

    // Sample density in a ring around agent to find least-explored direction
    let bestAngle = agent.heading;
    let lowestDensity = Infinity;
    let sampleDist = 30;
    let numSamples = 24;

    for (let i = 0; i < numSamples; i++) {
        let testAngle = (TWO_PI * i) / numSamples;
        let sx = agent.x + cos(testAngle) * sampleDist;
        let sy = agent.y + sin(testAngle) * sampleDist;
        let ix = constrain(floor(sx), 0, width - 1);
        let iy = constrain(floor(sy), 0, height - 1);
        let d = densityMap[ix][iy];
        if (d < lowestDensity) {
            lowestDensity = d;
            bestAngle = testAngle;
        }
    }

    // Smooth heading change
    let angleDiff = bestAngle - agent.heading;
    while (angleDiff > PI) angleDiff -= TWO_PI;
    while (angleDiff < -PI) angleDiff += TWO_PI;
    agent.heading += angleDiff * 0.15;

    // Check if agent is stuck (all surrounding areas have similar density)
    let densityVariation = 0;
    let densitiesAround = [];
    for (let i = 0; i < numSamples; i++) {
        let testAngle = (TWO_PI * i) / numSamples;
        let sx = agent.x + cos(testAngle) * sampleDist;
        let sy = agent.y + sin(testAngle) * sampleDist;
        let ix = constrain(floor(sx), 0, width - 1);
        let iy = constrain(floor(sy), 0, height - 1);
        densitiesAround.push(densityMap[ix][iy]);
    }
    densityVariation = max(densitiesAround) - min(densitiesAround);

    if (densityVariation < params.trailOpacity * 0.1 || agent.sameSpotCount > 60) {
        // Agent is stuck — add random perturbation
        agent.heading += random(-PI * 0.3, PI * 0.3);
        agent.sameSpotCount = 0;
    }

    if (abs(lowestDensity - agent.lastDensity) < 0.01) {
        agent.sameSpotCount++;
    } else {
        agent.sameSpotCount = 0;
    }
    agent.lastDensity = lowestDensity;

    // Move agent
    let speed = params.agentSpeed;
    // Slow down in high-density areas
    let localDensity = densityMap[constrain(floor(agent.x), 0, width-1)][constrain(floor(agent.y), 0, height-1)];
    let speedMod = constrain(map(localDensity, 0, 50, 1.0, 0.3), 0.3, 1.0);

    agent.x += cos(agent.heading) * speed * speedMod;
    agent.y += sin(agent.heading) * speed * speedMod;

    // Wrap or bounce at edges
    if (agent.x < 10) { agent.x = 10; agent.heading = 0; }
    if (agent.x > width - 10) { agent.x = width - 10; agent.heading = PI; }
    if (agent.y < 10) { agent.y = 10; agent.heading = HALF_PI; }
    if (agent.y > height - 10) { agent.y = height - 10; agent.heading = -HALF_PI; }
}

// ── Ray casting: step through noise field until threshold ──
function castRay(x, y, angle, maxDist) {
    let stepSize = 3;
    let cx = x;
    let cy = y;
    let steps = floor(maxDist / stepSize);
    let threshold = map(params.terrainComplexity, 1, 10, 0.8, 0.25);

    for (let s = 0; s < steps; s++) {
        cx += cos(angle) * stepSize;
        cy += sin(angle) * stepSize;

        if (cx < 0 || cx >= width || cy < 0 || cy >= height) {
            return {x: constrain(cx, 0, width-1), y: constrain(cy, 0, height-1)};
        }

        // Multi-octave noise for terrain
        let nx = cx * 0.004;
        let ny = cy * 0.004;
        let nv = noise(nx, ny);
        nv += 0.5 * noise(nx * 2.3 + 100, ny * 2.3 + 100);
        nv += 0.25 * noise(nx * 4.7 + 200, ny * 4.7 + 200);
        nv /= 1.75;

        if (nv > threshold) {
            return {x: cx, y: cy};
        }
    }
    return {x: cx, y: cy};
}

// ── Utility ──
function hexToRgba(hex, alpha) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    return color(r, g, b, alpha * 255);
}

// ═══════════════════════════════════════════════════════════════════════
// UI CONTROLS
// ═══════════════════════════════════════════════════════════════════════

function updateParam(paramName, value) {
    let v = parseFloat(value);
    params[paramName] = v;

    let displayId = paramName + '-value';
    let display = document.getElementById(displayId);
    if (display) {
        if (paramName === 'scanAngle') {
            display.textContent = v + '°';
        } else {
            display.textContent = v;
        }
    }

    // Regenerate on parameter change
    initSystem();
}

function updateColor(colorId, value) {
    let idx = parseInt(colorId.replace('color', '')) - 1;
    params.colorPalette[idx] = value;
    document.getElementById(colorId + '-value').textContent = value;
    initSystem();
}

// ═══════════════════════════════════════════════════════════════════════
// SEED CONTROLS
// ═══════════════════════════════════════════════════════════════════════

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    let input = document.getElementById('seed-input');
    let newSeed = parseInt(input.value);
    if (newSeed && newSeed > 0) {
        params.seed = newSeed;
        initSystem();
    } else {
        updateSeedDisplay();
    }
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    updateSeedDisplay();
    initSystem();
}

function nextSeed() {
    params.seed = params.seed + 1;
    updateSeedDisplay();
    initSystem();
}

function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 999999) + 1;
    updateSeedDisplay();
    initSystem();
}

function resetParameters() {
    params = JSON.parse(JSON.stringify(defaultParams));

    document.getElementById('sensorRays').value = params.sensorRays;
    document.getElementById('sensorRays-value').textContent = params.sensorRays;
    document.getElementById('sensorRange').value = params.sensorRange;
    document.getElementById('sensorRange-value').textContent = params.sensorRange;
    document.getElementById('scanAngle').value = params.scanAngle;
    document.getElementById('scanAngle-value').textContent = params.scanAngle + '°';
    document.getElementById('terrainComplexity').value = params.terrainComplexity;
    document.getElementById('terrainComplexity-value').textContent = params.terrainComplexity;
    document.getElementById('agentSpeed').value = params.agentSpeed;
    document.getElementById('agentSpeed-value').textContent = params.agentSpeed;
    document.getElementById('trailOpacity').value = params.trailOpacity;
    document.getElementById('trailOpacity-value').textContent = params.trailOpacity;
    document.getElementById('totalFrames').value = params.totalFrames;
    document.getElementById('totalFrames-value').textContent = params.totalFrames;

    document.getElementById('color1').value = params.colorPalette[0];
    document.getElementById('color1-value').textContent = params.colorPalette[0];
    document.getElementById('color2').value = params.colorPalette[1];
    document.getElementById('color2-value').textContent = params.colorPalette[1];
    document.getElementById('color3').value = params.colorPalette[2];
    document.getElementById('color3-value').textContent = params.colorPalette[2];

    updateSeedDisplay();
    initSystem();
}

function downloadPNG() {
    saveCanvas('cartographic-drift-seed-' + params.seed, 'png');
}

window.addEventListener('load', function() {
    updateSeedDisplay();
});
</script>
</body>
</html>
