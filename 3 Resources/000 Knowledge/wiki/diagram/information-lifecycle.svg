<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 830">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="34" fill="white" font-size="16" font-weight="700" text-anchor="middle">信息生命周期 — 双视角模型</text>
  <text x="600" y="52" fill="#64748b" font-size="9" text-anchor="middle">Information Lifecycle: Classical IS × KOS Operational View</text>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: Classical IS Lifecycle -->
  <!-- ============================================================ -->
  <rect x="18" y="62" width="564" height="728" rx="10" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="290" y="88" fill="#94a3b8" font-size="12" font-weight="600" text-anchor="middle">信息科学视角：八阶段生命周期</text>
  <text x="290" y="104" fill="#64748b" font-size="8" text-anchor="middle">Classical IS Lifecycle Model</text>

  <!-- Orbit track -->
  <ellipse cx="290" cy="420" rx="160" ry="160" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Curved arrows between nodes (clockwise flow) - drawn BEFORE nodes for masking -->
  <!-- 1→2: 创建→采集 (angle -75° to -60°) -->
  <path d="M 331,271 A 160,160 0 0,1 369,303" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <!-- 2→3: 采集→组织 (angle -30° to -15°) -->
  <path d="M 429,340 A 160,160 0 0,1 444,378" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <!-- 3→4: 组织→存储 (angle 15° to 30°) -->
  <path d="M 444,462 A 160,160 0 0,1 429,500" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <!-- 4→5: 存储→检索 (angle 45° to 60°) -->
  <path d="M 369,537 A 160,160 0 0,1 331,569" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <!-- 5→6: 检索→传播 (angle 75° to 90°, wait 90→105°) -->
  <!-- Actually: 检索 at 90°, 传播 at 135°. Mid arc 90°→135° -->
  <path d="M 249,569 A 160,160 0 0,1 211,537" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <!-- 6→7: 传播→使用 (angle 150° to 165°) -->
  <path d="M 151,500 A 160,160 0 0,1 136,462" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <!-- 7→8: 使用→保存/销毁 (angle ~195° to ~210°) -->
  <path d="M 136,378 A 160,160 0 0,1 151,340" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <!-- 8→1: 保存/销毁→创建 (angle ~240° to ~255°) -->
  <path d="M 211,303 A 160,160 0 0,1 249,271" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Center label -->
  <text x="290" y="412" fill="#64748b" font-size="10" font-weight="600" text-anchor="middle">信息生命</text>
  <text x="290" y="428" fill="#64748b" font-size="10" font-weight="600" text-anchor="middle">周期</text>
  <text x="290" y="446" fill="#475569" font-size="7" text-anchor="middle">反馈循环</text>

  <!-- Node 1: 创建 (top, angle=-90°) -->
  <rect x="245" y="233" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="245" y="233" width="90" height="36" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="290" y="256" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">创建</text>

  <!-- Node 2: 采集 (upper-right, angle=-45°) -->
  <rect x="349" y="285" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="349" y="285" width="90" height="36" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="394" y="308" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">采集</text>

  <!-- Node 3: 组织 (right, angle=0°) -->
  <rect x="399" y="402" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="399" y="402" width="90" height="36" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="444" y="425" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">组织</text>

  <!-- Node 4: 存储 (lower-right, angle=45°) -->
  <rect x="349" y="519" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="349" y="519" width="90" height="36" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="394" y="542" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">存储</text>

  <!-- Node 5: 检索 (bottom, angle=90°) -->
  <rect x="245" y="571" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="245" y="571" width="90" height="36" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="290" y="594" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">检索</text>

  <!-- Node 6: 传播 (lower-left, angle=135°) -->
  <rect x="141" y="519" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="141" y="519" width="90" height="36" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="186" y="542" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">传播</text>

  <!-- Node 7: 使用 (left, angle=180°) -->
  <rect x="91" y="402" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="91" y="402" width="90" height="36" rx="5" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="136" y="425" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">使用</text>

  <!-- Node 8: 保存/销毁 (upper-left, angle=225° or -135°) -->
  <rect x="141" y="285" width="90" height="36" rx="5" fill="#0f172a"/>
  <rect x="141" y="285" width="90" height="36" rx="5" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="186" y="304" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">保存</text>
  <text x="186" y="316" fill="#fb7185" font-size="8" text-anchor="middle">/ 销毁</text>

  <!-- Sub-labels for each stage -->
  <text x="290" y="275" fill="#475569" font-size="7" text-anchor="middle">信息产生</text>
  <text x="394" y="327" fill="#475569" font-size="7" text-anchor="middle">馆藏发展</text>
  <text x="444" y="444" fill="#475569" font-size="7" text-anchor="middle">分类编目</text>
  <text x="394" y="561" fill="#475569" font-size="7" text-anchor="middle">数字仓储</text>
  <text x="290" y="613" fill="#475569" font-size="7" text-anchor="middle">信息检索</text>
  <text x="186" y="561" fill="#475569" font-size="7" text-anchor="middle">开放获取</text>
  <text x="136" y="444" fill="#475569" font-size="7" text-anchor="middle">信息行为</text>
  <text x="186" y="327" fill="#475569" font-size="7" text-anchor="middle">长期保存</text>

  <!-- IS → KOS mapping arrows (from select IS stages to middle) -->
  <!-- 采集 → middle bridge -->
  <path d="M 439,303 L 576,303" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- 组织 → middle bridge -->
  <path d="M 489,420 L 576,420" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- 存储 → middle bridge -->
  <path d="M 439,537 L 576,537" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- ============================================================ -->
  <!-- MIDDLE BRIDGE: Mapping Labels -->
  <!-- ============================================================ -->
  <rect x="582" y="62" width="36" height="728" rx="4" fill="rgba(8,51,68,0.15)" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="4,2"/>

  <text x="600" y="200" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle" transform="rotate(-90, 600, 200)">采集 → 时效性判定</text>
  <text x="600" y="370" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle" transform="rotate(-90, 600, 370)">组织 → 路由分发</text>
  <text x="600" y="570" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle" transform="rotate(-90, 600, 570)">存储 → 知识编译</text>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: KOS Lifecycle -->
  <!-- ============================================================ -->
  <rect x="618" y="62" width="564" height="728" rx="10" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="6,4"/>

  <text x="900" y="88" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">KOS 操作视角：四层时效性模型</text>
  <text x="900" y="104" fill="#64748b" font-size="8" text-anchor="middle">KOS Operational Lifecycle — Temporal Classification</text>

  <!-- Left annotations (inside right panel) -->
  <text x="636" y="235" fill="#64748b" font-size="9" font-weight="500">信息量递减</text>
  <text x="636" y="250" fill="#475569" font-size="8">↓ 高 → 低</text>

  <text x="636" y="355" fill="#64748b" font-size="9" font-weight="500">熵值递减</text>
  <text x="636" y="370" fill="#475569" font-size="8">↓ 混乱 → 有序</text>

  <text x="636" y="475" fill="#64748b" font-size="9" font-weight="500">可用性递增</text>
  <text x="636" y="490" fill="#475569" font-size="8">↑ 难用 → 易用</text>

  <!-- Right annotations (outside right panel, left-aligned at x=636 area) -->
  <text x="636" y="595" fill="#64748b" font-size="9" font-weight="500">维护成本递减</text>
  <text x="636" y="610" fill="#475569" font-size="8">↓ 耗时 → 自动</text>

  <text x="636" y="680" fill="#64748b" font-size="9" font-weight="500">查询效率递增</text>
  <text x="636" y="695" fill="#475569" font-size="8">↑ 慢 → 快</text>

  <!-- LAYER 1: ephemeral (widest) -->
  <!-- Mask -->
  <rect x="648" y="195" width="504" height="68" rx="8" fill="#0f172a"/>
  <!-- Visual -->
  <rect x="648" y="195" width="504" height="68" rx="8" fill="rgba(30,41,59,0.4)" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Time label -->
  <rect x="658" y="201" width="48" height="16" rx="3" fill="rgba(30,41,59,0.6)" stroke="#64748b" stroke-width="0.8"/>
  <text x="682" y="213" fill="#94a3b8" font-size="8" font-weight="600" text-anchor="middle">1-7天</text>
  <!-- Content -->
  <text x="900" y="220" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">ephemeral  临时信息</text>
  <text x="900" y="238" fill="#94a3b8" font-size="9" text-anchor="middle">任务提醒 · 临时代码 · 一次性备忘</text>
  <text x="900" y="254" fill="#64748b" font-size="8" text-anchor="middle">→ tasks.md (7 天自动过期)</text>

  <!-- Arrow: ephemeral → operational -->
  <line x1="900" y1="263" x2="900" y2="306" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="876" y="272" width="48" height="14" rx="3" fill="#0f172a"/>
  <text x="900" y="282" fill="#22d3ee" font-size="8" font-weight="500" text-anchor="middle">/triage</text>

  <!-- LAYER 2: operational -->
  <rect x="688" y="310" width="424" height="68" rx="8" fill="#0f172a"/>
  <rect x="688" y="310" width="424" height="68" rx="8" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="698" y="316" width="52" height="16" rx="3" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="724" y="328" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle">1周-3月</text>
  <text x="900" y="335" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">operational  运行中信息</text>
  <text x="900" y="353" fill="#94a3b8" font-size="9" text-anchor="middle">项目笔记 · 会议记录 · 周报月报</text>
  <text x="900" y="369" fill="#64748b" font-size="8" text-anchor="middle">→ 1 Projects/ (项目结束 → 4 Archives/)</text>

  <!-- Arrow: operational → reference -->
  <line x1="900" y1="378" x2="900" y2="421" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <rect x="876" y="387" width="48" height="14" rx="3" fill="#0f172a"/>
  <text x="900" y="397" fill="#a78bfa" font-size="8" font-weight="500" text-anchor="middle">/triage</text>

  <!-- LAYER 3: reference -->
  <rect x="728" y="425" width="344" height="68" rx="8" fill="#0f172a"/>
  <rect x="728" y="425" width="344" height="68" rx="8" fill="rgba(76,29,149,0.25)" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="738" y="431" width="36" height="16" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="756" y="443" fill="#a78bfa" font-size="8" font-weight="600" text-anchor="middle">长期</text>
  <text x="900" y="450" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">reference  参考资料</text>
  <text x="900" y="468" fill="#94a3b8" font-size="9" text-anchor="middle">文章摘录 · 论文笔记 · 书籍摘要 · 网页保存</text>
  <text x="900" y="484" fill="#64748b" font-size="8" text-anchor="middle">→ 3 Resources/[topic]/raw/ (待编译)</text>

  <!-- Arrow: reference → evergreen -->
  <line x1="900" y1="493" x2="900" y2="536" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <rect x="868" y="502" width="64" height="14" rx="3" fill="#0f172a"/>
  <text x="900" y="512" fill="#fbbf24" font-size="8" font-weight="500" text-anchor="middle">/wiki-compile</text>

