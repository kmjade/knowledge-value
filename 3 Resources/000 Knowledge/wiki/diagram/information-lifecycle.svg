  <rect x="768" y="540" width="264" height="68" rx="8" fill="#0f172a"/>
  <rect x="768" y="540" width="264" height="68" rx="8" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="778" y="546" width="36" height="16" rx="3" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="796" y="558" fill="#fbbf24" font-size="8" font-weight="600" text-anchor="middle">永久</text>
  <text x="900" y="565" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">evergreen  常青知识</text>
  <text x="900" y="583" fill="#94a3b8" font-size="9" text-anchor="middle">概念 · 实体 · 原则 · 方法论</text>
  <text x="900" y="599" fill="#64748b" font-size="8" text-anchor="middle">→ 3 Resources/[topic]/wiki/ (AI 独占)</text>

