<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 780">
  <defs>
    <pattern id="grid-small" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.3"/>
    </pattern>

    <!-- Glow filters -->
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-violet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow-up-amber" markerWidth="10" markerHeight="8" refX="5" refY="0" orient="auto">
      <polygon points="0 8, 5 0, 10 8" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-up-violet" markerWidth="10" markerHeight="8" refX="5" refY="0" orient="auto">
      <polygon points="0 8, 5 0, 10 8" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-up-cyan" markerWidth="10" markerHeight="8" refX="5" refY="0" orient="auto">
      <polygon points="0 8, 5 0, 10 8" fill="#22d3ee"/>
    </marker>

    <marker id="arrow-down-slate" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 5 8, 10 0" fill="#64748b"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid-small)"/>

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->
  <text x="530" y="36" fill="white" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="2">知识组织金字塔</text>
  <text x="530" y="55" fill="#64748b" font-size="11" text-anchor="middle">Knowledge Organization Pyramid — KOS 系统知识层级模型</text>

  <!-- ============================================================ -->
  <!-- PYRAMID BACKGROUND SHADOW (subtle triangle outline) -->
  <!-- ============================================================ -->
  <polygon points="530,50 980,630 80,630" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="10,6"/>

  <!-- ============================================================ -->
  <!-- LAYER 4 (TOP): 洞察与应用 -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <!-- Mask -->
    <rect x="330" y="72" width="400" height="102" rx="10" fill="#0f172a"/>
    <!-- Visual -->
    <rect x="330" y="72" width="400" height="102" rx="10" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="2" filter="url(#glow-amber)"/>
  </g>

  <!-- Peak accent -->
  <polygon points="530,62 510,76 550,76" fill="#fbbf24" opacity="0.6"/>
  <text x="530" y="71" fill="#0f172a" font-size="9" font-weight="700" text-anchor="middle">✦</text>

  <!-- Layer 4 header -->
  <rect x="330" y="72" width="400" height="28" rx="10" fill="rgba(251,191,36,0.2)"/>
  <rect x="330" y="90" width="400" height="10" fill="rgba(251,191,36,0.2)"/> <!-- sharpen bottom of header -->
  <text x="530" y="92" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">L4 洞察与应用</text>

  <!-- Layer 4 content -->
  <text x="350" y="122" fill="#fbbf24" font-size="9" font-weight="500">综合报告</text>
  <text x="500" y="122" fill="#fbbf24" font-size="9" font-weight="500">决策支持</text>
  <text x="350" y="143" fill="#fbbf24" font-size="9" font-weight="500">知识发现</text>
  <text x="500" y="143" fill="#fbbf24" font-size="9" font-weight="500">编译红利</text>
  <text x="350" y="164" fill="#fbbf24" font-size="9" font-weight="500">⏱ outputs/</text>
  <text x="500" y="164" fill="#64748b" font-size="8">AI 驱动制品</text>

  <!-- Top label -->
  <text x="870" y="100" fill="#fbbf24" font-size="9" font-weight="600">高可用性</text>
  <text x="870" y="118" fill="#64748b" font-size="8">行动导向</text>

  <!-- ============================================================ -->
  <!-- ARROW 3→4 -->
  <!-- ============================================================ -->
  <path d="M 530 174 L 530 195" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-up-amber)"/>
  <rect x="475" y="180" width="110" height="20" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="530" y="194" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">🔍 /query</text>

  <!-- ============================================================ -->
  <!-- LAYER 3: Wiki 编译知识 -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="230" y="202" width="600" height="105" rx="10" fill="#0f172a"/>
    <rect x="230" y="202" width="600" height="105" rx="10" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1.8" filter="url(#glow-violet)"/>
  </g>

  <rect x="230" y="202" width="600" height="28" rx="10" fill="rgba(167,139,250,0.18)"/>
  <rect x="230" y="220" width="600" height="10" fill="rgba(167,139,250,0.18)"/>
  <text x="530" y="222" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">L3 Wiki 编译知识</text>

  <!-- Sub-boxes in grid -->
  <rect x="248" y="242" width="130" height="28" rx="4" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="313" y="260" fill="#c4b5fd" font-size="9" font-weight="500" text-anchor="middle">wiki/concepts</text>

  <rect x="390" y="242" width="130" height="28" rx="4" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="455" y="260" fill="#c4b5fd" font-size="9" font-weight="500" text-anchor="middle">wiki/entities</text>

  <rect x="532" y="242" width="130" height="28" rx="4" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="597" y="260" fill="#c4b5fd" font-size="9" font-weight="500" text-anchor="middle">wiki/sources</text>

  <rect x="674" y="242" width="130" height="28" rx="4" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="739" y="260" fill="#c4b5fd" font-size="9" font-weight="500" text-anchor="middle">wiki/index</text>

  <!-- Layer 3 labels -->
  <text x="248" y="294" fill="#a78bfa" font-size="8">结构化知识 · 低熵态</text>
  <text x="600" y="294" fill="#64748b" font-size="8">AI 独占写入 · 可溯源</text>

  <!-- ============================================================ -->
  <!-- ARROW 2→3 -->
  <!-- ============================================================ -->
  <path d="M 530 307 L 530 330" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-up-violet)"/>
  <rect x="455" y="313" width="150" height="20" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="530" y="327" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">📝 /wiki-compile</text>

  <!-- ============================================================ -->
  <!-- LAYER 2: PARA 生活管理 -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="130" y="337" width="800" height="105" rx="10" fill="#0f172a"/>
    <rect x="130" y="337" width="800" height="105" rx="10" fill="rgba(34,211,238,0.06)" stroke="#22d3ee" stroke-width="1.6" filter="url(#glow-cyan)"/>
  </g>

  <rect x="130" y="337" width="800" height="28" rx="10" fill="rgba(34,211,238,0.15)"/>
  <rect x="130" y="355" width="800" height="10" fill="rgba(34,211,238,0.15)"/>
  <text x="530" y="357" fill="#22d3ee" font-size="13" font-weight="700" text-anchor="middle">L2 PARA 生活管理</text>

  <rect x="148" y="377" width="170" height="28" rx="4" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="233" y="395" fill="#67e8f9" font-size="9" font-weight="500" text-anchor="middle">1 Projects</text>

  <rect x="330" y="377" width="170" height="28" rx="4" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="415" y="395" fill="#67e8f9" font-size="9" font-weight="500" text-anchor="middle">2 Areas</text>

  <rect x="512" y="377" width="170" height="28" rx="4" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="597" y="395" fill="#67e8f9" font-size="9" font-weight="500" text-anchor="middle">3 Resources</text>

  <rect x="694" y="377" width="170" height="28" rx="4" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="779" y="395" fill="#67e8f9" font-size="9" font-weight="500" text-anchor="middle">4 Archives</text>

  <text x="148" y="432" fill="#22d3ee" font-size="8">时效性信息 · 按场景组织</text>
  <text x="600" y="432" fill="#64748b" font-size="8">人类主导 · AI 辅助</text>

  <!-- ============================================================ -->
  <!-- ARROW 1→2 -->
  <!-- ============================================================ -->
  <path d="M 530 442 L 530 468" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-up-cyan)"/>
  <rect x="465" y="450" width="130" height="20" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="530" y="464" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">⚡ /triage 分拣</text>

  <!-- ============================================================ -->
  <!-- LAYER 1 (BOTTOM): 原始资料 -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="30" y="475" width="1000" height="108" rx="10" fill="#0f172a"/>
    <rect x="30" y="475" width="1000" height="108" rx="10" fill="rgba(100,116,139,0.06)" stroke="#64748b" stroke-width="1.5"/>
  </g>

  <rect x="30" y="475" width="1000" height="28" rx="10" fill="rgba(100,116,139,0.12)"/>
  <rect x="30" y="493" width="1000" height="10" fill="rgba(100,116,139,0.12)"/>
  <text x="530" y="495" fill="#94a3b8" font-size="13" font-weight="700" text-anchor="middle">L1 原始资料 raw/</text>

  <rect x="50" y="515" width="210" height="28" rx="4" fill="rgba(100,116,139,0.08)" stroke="#64748b" stroke-width="0.7"/>
  <text x="155" y="533" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">🌐 网页采集</text>

  <rect x="275" y="515" width="210" height="28" rx="4" fill="rgba(100,116,139,0.08)" stroke="#64748b" stroke-width="0.7"/>
  <text x="380" y="533" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">📄 论文笔记</text>

  <rect x="500" y="515" width="210" height="28" rx="4" fill="rgba(100,116,139,0.08)" stroke="#64748b" stroke-width="0.7"/>
  <text x="605" y="533" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">📚 书籍摘录</text>

  <rect x="725" y="515" width="210" height="28" rx="4" fill="rgba(100,116,139,0.08)" stroke="#64748b" stroke-width="0.7"/>
  <text x="830" y="533" fill="#94a3b8" font-size="9" font-weight="500" text-anchor="middle">💬 对话记录</text>

  <text x="50" y="570" fill="#64748b" font-size="8">未结构化 · 高信息量 · 低可用性</text>
  <text x="700" y="570" fill="#475569" font-size="8">人类维护 · AI 只读 · 原始来源</text>

  <!-- ============================================================ -->
  <!-- LEFT SIDE ANNOTATIONS -->
  <!-- ============================================================ -->

  <!-- Label group: 信息量 -->
  <text x="18" y="500" fill="#94a3b8" font-size="9" font-weight="600" writing-mode="tb">← 信息量 (大)        (小) 信息量 →</text>
  <path d="M 14 510 L 14 180" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,4"/>
  <polygon points="14,175 11,185 17,185" fill="#94a3b8"/>

  <!-- Label group: 熵值 -->
  <text x="48" y="510" fill="#64748b" font-size="8" writing-mode="tb">熵值高 ————————————————— 熵值低</text>

  <!-- Label group: 可用性 -->
  <text x="66" y="510" fill="#60a5fa" font-size="8" writing-mode="tb">可用性低 ———————————— 可用性高</text>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE ANNOTATIONS -->
  <!-- ============================================================ -->

  <!-- Label group: 维护成本 -->
  <text x="1028" y="510" fill="#94a3b8" font-size="9" font-weight="600" writing-mode="tb">← 维护成本 (高)        (低) 维护成本</text>
  <path d="M 1032 510 L 1032 180" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,4"/>
  <polygon points="1032,175 1029,185 1035,185" fill="#94a3b8"/>

  <!-- Label group: 查询效率 -->
  <text x="1002" y="510" fill="#64748b" font-size="8" writing-mode="tb">查询效率低 ——————————————————— 查询效率高</text>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE SYSTEM OP FLOW -->
  <!-- ============================================================ -->

  <!-- Vertical flow on the right -->
  <path d="M 1015 540 L 1015 140" fill="none" stroke="#475569" stroke-width="0.8" stroke-dasharray="2,4"/>

  <!-- Flow arrows on right side between layers -->
  <path d="M 1015 460 L 1015 370" fill="none" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-up-cyan)"/>
  <path d="M 1015 330 L 1015 240" fill="none" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrow-up-violet)"/>
  <path d="M 1015 200 L 1015 110" fill="none" stroke="#fbbf24" stroke-width="1" marker-end="url(#arrow-up-amber)"/>

  <!-- ============================================================ -->
  <!-- BOTTOM SECTION: INFO LIFECYCLE BAR -->
  <!-- ============================================================ -->
  <rect x="80" y="605" width="900" height="65" rx="8" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="0.8"/>

  <text x="120" y="628" fill="white" font-size="11" font-weight="700">⏱ 信息生命周期</text>

  <!-- Lifecycle stages -->
  <rect x="120" y="640" width="80" height="20" rx="3" fill="rgba(100,116,139,0.2)" stroke="#64748b" stroke-width="0.6"/>
  <text x="160" y="654" fill="#94a3b8" font-size="8" text-anchor="middle">ephemeral</text>

  <path d="M 200 650 L 220 650" fill="none" stroke="#475569" stroke-width="1" marker-end="url(#arrow-down-slate)"/>

  <rect x="225" y="640" width="100" height="20" rx="3" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="0.6"/>
  <text x="275" y="654" fill="#22d3ee" font-size="8" text-anchor="middle">operational</text>

  <path d="M 325 650 L 345 650" fill="none" stroke="#475569" stroke-width="1" marker-end="url(#arrow-down-slate)"/>

  <rect x="350" y="640" width="100" height="20" rx="3" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="0.6"/>
  <text x="400" y="654" fill="#a78bfa" font-size="8" text-anchor="middle">reference</text>

  <path d="M 450 650 L 470 650" fill="none" stroke="#475569" stroke-width="1" marker-end="url(#arrow-down-slate)"/>

  <rect x="475" y="640" width="100" height="20" rx="3" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="0.6"/>
  <text x="525" y="654" fill="#fbbf24" font-size="8" text-anchor="middle">evergreen</text>

  <text x="750" y="645" fill="#94a3b8" font-size="8">天 → 周-月 → 年 → 永久</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="80" y="690" width="235" height="22" rx="4" fill="rgba(30,41,59,0.4)"/>
  <circle cx="100" cy="701" r="5" fill="#64748b"/>
  <text x="112" y="705" fill="#64748b" font-size="8">raw/ 原始</text>
  <circle cx="185" cy="701" r="5" fill="#22d3ee"/>
  <text x="197" y="705" fill="#22d3ee" font-size="8">PARA 组织</text>
  <circle cx="275" cy="701" r="5" fill="#a78bfa"/>
  <text x="287" y="705" fill="#a78bfa" font-size="8">Wiki 编译</text>

  <rect x="440" y="690" width="235" height="22" rx="4" fill="rgba(30,41,59,0.4)"/>
  <circle cx="460" cy="701" r="5" fill="#fbbf24"/>
  <text x="472" y="705" fill="#fbbf24" font-size="8">洞察应用</text>
  <text x="580" y="705" fill="#475569" font-size="8">熵值: 高 → 低 | 可用性: 低 → 高</text>

  <!-- ============================================================ -->
  <!-- CORE PRINCIPLE CALLOUT -->
  <!-- ============================================================ -->
  <rect x="700" y="690" width="280" height="22" rx="4" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="840" y="705" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="middle">⬡ 三层金字塔：从信息到智慧的升维</text>

</svg>
