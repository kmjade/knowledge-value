<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 820">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-small" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.3"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>

    <!-- Glow filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for boxes -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid-small)"/>

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->
  <text x="560" y="38" fill="white" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="2">KOS — Knowledge Operating System</text>
  <text x="560" y="55" fill="#64748b" font-size="11" text-anchor="middle">知识操作系统架构总览</text>

  <!-- ============================================================ -->
  <!-- I/O LAYER REGION -->
  <!-- ============================================================ -->
  <rect x="60" y="78" width="1000" height="115" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="8,4" fill-opacity="0.05"/>
  <rect x="60" y="78" width="1000" height="115" rx="12" fill="rgba(34,211,238,0.03)"/>
  <text x="78" y="98" fill="#22d3ee" font-size="11" font-weight="600">📥 I/O 层 — 信息捕获入口</text>

  <!-- External sources -->
  <rect x="100" y="115" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="100" y="115" width="140" height="45" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="170" y="133" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">🌐 Web Clipper</text>
  <text x="170" y="148" fill="#64748b" font-size="8" text-anchor="middle">网页采集</text>

  <rect x="270" y="115" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="270" y="115" width="140" height="45" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="340" y="133" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">🎤 语音备忘</text>
  <text x="340" y="148" fill="#64748b" font-size="8" text-anchor="middle">Telegram 语音</text>

  <!-- Inbox (center hub) -->
  <rect x="440" y="105" width="280" height="62" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="440" y="105" width="280" height="62" rx="8" fill="rgba(34,211,238,0.18)" stroke="#22d3ee" stroke-width="2" filter="url(#glow-cyan)"/>
  <text x="580" y="128" fill="white" font-size="13" font-weight="700" text-anchor="middle">📨 Inbox</text>
  <text x="580" y="148" fill="#94a3b8" font-size="9" text-anchor="middle">统一信息捕获入口 · 待分拣</text>
  <text x="580" y="160" fill="#64748b" font-size="8" text-anchor="middle">唯一入口 → triage 分拣后分流</text>

  <!-- Arrows to Inbox -->
  <path d="M 240 137 L 435 137" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-cyan)"/>
  <path d="M 410 137 L 435 137" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-cyan)"/>

  <!-- Right side sources -->
  <rect x="790" y="115" width="140" height="45" rx="6" fill="#0f172a"/>
  <rect x="790" y="115" width="140" height="45" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="860" y="133" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">💬 Telegram</text>
  <text x="860" y="148" fill="#64748b" font-size="8" text-anchor="middle">消息指令</text>

  <rect x="960" y="115" width="80" height="45" rx="6" fill="#0f172a"/>
  <rect x="960" y="115" width="80" height="45" rx="6" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="1000" y="133" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">📄 文件</text>
  <text x="1000" y="148" fill="#64748b" font-size="8" text-anchor="middle">直接导入</text>

  <path d="M 930 137 L 955 137" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-cyan)"/>

  <!-- ============================================================ -->
  <!-- DOWNWARD ARROWS FROM INBOX -->
  <!-- ============================================================ -->
  <path d="M 450 167 L 450 200 L 300 200 L 300 225" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <path d="M 710 167 L 710 200 L 860 200 L 860 225" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- Triage label -->
  <rect x="535" y="183" width="90" height="22" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="580" y="198" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">⚡ /triage</text>

  <!-- ============================================================ -->
  <!-- LIFE OPS BRAIN REGION (LEFT) -->
  <!-- ============================================================ -->
  <rect x="60" y="228" width="480" height="240" rx="12" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="60" y="228" width="480" height="240" rx="12" fill="rgba(52,211,153,0.03)"/>
  <text x="78" y="250" fill="#34d399" font-size="11" font-weight="600">🧠 LifeOps Brain — 进程管理</text>
  <text x="78" y="264" fill="#64748b" font-size="8">时效性信息 · 人类主导 + AI 辅助</text>

  <!-- PARA boxes -->
  <rect x="90" y="280" width="195" height="52" rx="6" fill="#0f172a"/>
  <rect x="90" y="280" width="195" height="52" rx="6" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1.2"/>
  <text x="187" y="301" fill="white" font-size="11" font-weight="600" text-anchor="middle">1️⃣ Projects</text>
  <text x="187" y="319" fill="#94a3b8" font-size="9" text-anchor="middle">有截止日期的任务</text>

  <rect x="315" y="280" width="195" height="52" rx="6" fill="#0f172a"/>
  <rect x="315" y="280" width="195" height="52" rx="6" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1.2"/>
  <text x="412" y="301" fill="white" font-size="11" font-weight="600" text-anchor="middle">2️⃣ Areas</text>
  <text x="412" y="319" fill="#94a3b8" font-size="9" text-anchor="middle">持续责任领域</text>

  <rect x="90" y="350" width="195" height="52" rx="6" fill="#0f172a"/>
  <rect x="90" y="350" width="195" height="52" rx="6" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1.2"/>
  <text x="187" y="371" fill="white" font-size="11" font-weight="600" text-anchor="middle">3️⃣ Resources</text>
  <text x="187" y="389" fill="#94a3b8" font-size="9" text-anchor="middle">知识资源库</text>

  <rect x="315" y="350" width="195" height="52" rx="6" fill="#0f172a"/>
  <rect x="315" y="350" width="195" height="52" rx="6" fill="rgba(52,211,153,0.1)" stroke="#34d399" stroke-width="1.2"/>
  <text x="412" y="371" fill="white" font-size="11" font-weight="600" text-anchor="middle">4️⃣ Archives</text>
  <text x="412" y="389" fill="#94a3b8" font-size="9" text-anchor="middle">归档内容</text>

  <!-- raw/ label -->
  <rect x="90" y="418" width="420" height="36" rx="4" fill="rgba(251,191,36,0.08)" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="300" y="441" fill="#fbbf24" font-size="9" text-anchor="middle">📁 raw/ — 原始资料（人类独占 · AI 只读）</text>

  <!-- ============================================================ -->
  <!-- KNOWLEDGE BRAIN REGION (RIGHT) -->
  <!-- ============================================================ -->
  <rect x="580" y="228" width="480" height="240" rx="12" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="580" y="228" width="480" height="240" rx="12" fill="rgba(167,139,250,0.03)"/>
  <text x="598" y="250" fill="#a78bfa" font-size="11" font-weight="600">🧠 Knowledge Brain — 文件系统</text>
  <text x="598" y="264" fill="#64748b" font-size="8">结构化知识 · AI 独占写入</text>

  <!-- Wiki boxes -->
  <rect x="610" y="280" width="200" height="52" rx="6" fill="#0f172a"/>
  <rect x="610" y="280" width="200" height="52" rx="6" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="710" y="301" fill="white" font-size="11" font-weight="600" text-anchor="middle">📘 wiki/concepts</text>
  <text x="710" y="319" fill="#94a3b8" font-size="9" text-anchor="middle">概念页面</text>

  <rect x="830" y="280" width="200" height="52" rx="6" fill="#0f172a"/>
  <rect x="830" y="280" width="200" height="52" rx="6" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="930" y="301" fill="white" font-size="11" font-weight="600" text-anchor="middle">📗 wiki/entities</text>
  <text x="930" y="319" fill="#94a3b8" font-size="9" text-anchor="middle">实体页面</text>

  <rect x="610" y="350" width="200" height="52" rx="6" fill="#0f172a"/>
  <rect x="610" y="350" width="200" height="52" rx="6" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="710" y="371" fill="white" font-size="11" font-weight="600" text-anchor="middle">📙 wiki/sources</text>
  <text x="710" y="389" fill="#94a3b8" font-size="9" text-anchor="middle">来源溯源</text>

  <rect x="830" y="350" width="200" height="52" rx="6" fill="#0f172a"/>
  <rect x="830" y="350" width="200" height="52" rx="6" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="930" y="371" fill="white" font-size="11" font-weight="600" text-anchor="middle">📕 wiki/index</text>
  <text x="930" y="389" fill="#94a3b8" font-size="9" text-anchor="middle">知识索引</text>

  <!-- Wiki output label -->
  <rect x="610" y="418" width="420" height="36" rx="4" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="820" y="441" fill="#a78bfa" font-size="9" text-anchor="middle">📤 编译红利：一次编译 · 多次查询 · Token 节省 ~99%</text>

  <!-- ============================================================ -->
  <!-- COMPILE ARROW (LifeOps → Knowledge) -->
  <!-- ============================================================ -->
  <path d="M 540 436 L 605 436" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="572" y="430" fill="#fbbf24" font-size="8" text-anchor="middle">/wiki-compile</text>

  <!-- ============================================================ -->
  <!-- KERNEL LAYER REGION -->
  <!-- ============================================================ -->
  <rect x="60" y="495" width="1000" height="120" rx="12" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="60" y="495" width="1000" height="120" rx="12" fill="rgba(251,191,36,0.03)"/>
  <text x="78" y="517" fill="#fbbf24" font-size="11" font-weight="600">⚙️ 内核层 (Kernel)</text>

  <!-- AI Agent box -->
  <rect x="90" y="528" width="260" height="68" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="90" y="528" width="260" height="68" rx="8" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="1.8" filter="url(#glow-amber)"/>
  <text x="220" y="553" fill="white" font-size="13" font-weight="700" text-anchor="middle">🤖 AI Agent</text>
  <text x="220" y="573" fill="#94a3b8" font-size="10" text-anchor="middle">Claude Code · 执行引擎</text>
  <text x="220" y="588" fill="#64748b" font-size="8" text-anchor="middle">Skills · Memory · Gateway</text>

  <!-- Skills boxes -->
  <rect x="400" y="535" width="125" height="54" rx="6" fill="#0f172a"/>
  <rect x="400" y="535" width="125" height="54" rx="6" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="462" y="558" fill="#fb923c" font-size="11" font-weight="600" text-anchor="middle">⚡ /triage</text>
  <text x="462" y="578" fill="#94a3b8" font-size="9" text-anchor="middle">分拣引擎</text>

  <rect x="545" y="535" width="125" height="54" rx="6" fill="#0f172a"/>
  <rect x="545" y="535" width="125" height="54" rx="6" fill="rgba(59,130,246,0.1)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="607" y="558" fill="#60a5fa" font-size="11" font-weight="600" text-anchor="middle">📝 /wiki-compile</text>
  <text x="607" y="578" fill="#94a3b8" font-size="9" text-anchor="middle">知识编译</text>

  <rect x="690" y="535" width="125" height="54" rx="6" fill="#0f172a"/>
  <rect x="690" y="535" width="125" height="54" rx="6" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="752" y="558" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">🔍 /query</text>
  <text x="752" y="578" fill="#94a3b8" font-size="9" text-anchor="middle">知识查询</text>

  <rect x="835" y="535" width="125" height="54" rx="6" fill="#0f172a"/>
  <rect x="835" y="535" width="125" height="54" rx="6" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-width="1.2"/>
  <text x="897" y="558" fill="#f87171" font-size="11" font-weight="600" text-anchor="middle">🩺 /lint</text>
  <text x="897" y="578" fill="#94a3b8" font-size="9" text-anchor="middle">健康检查</text>

  <!-- Arrow connecting Kernel to brains -->
  <path d="M 220 528 L 220 470" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-amber)"/>

  <!-- ============================================================ -->
  <!-- THREE LAWS SECTION -->
  <!-- ============================================================ -->
  <text x="560" y="648" fill="white" font-size="14" font-weight="700" text-anchor="middle">📐 三条基本定律</text>

  <!-- Law 1 -->
  <rect x="65" y="662" width="310" height="105" rx="10" fill="#0f172a"/>
  <rect x="65" y="662" width="310" height="105" rx="10" fill="rgba(96,165,250,0.06)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="220" y="688" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">第一定律：分离定律</text>
  <text x="220" y="708" fill="#94a3b8" font-size="9" text-anchor="middle">不同类型信息必须物理隔离</text>
  <text x="220" y="726" fill="#64748b" font-size="8" text-anchor="middle">LifeOps (生活) ⟂ Knowledge (知识)</text>
  <text x="220" y="744" fill="#475569" font-size="8" text-anchor="middle">Inbox 是唯一交叉点 → 避免语义污染</text>
  <text x="220" y="758" fill="#1e40af" font-size="8" text-anchor="middle">⬤ 违反 → Semantic Pollution</text>

  <!-- Law 2 -->
  <rect x="405" y="662" width="310" height="105" rx="10" fill="#0f172a"/>
  <rect x="405" y="662" width="310" height="105" rx="10" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="560" y="688" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">第二定律：编译定律</text>
  <text x="560" y="708" fill="#94a3b8" font-size="9" text-anchor="middle">原始资料须经 AI 编译才能成为知识</text>
  <text x="560" y="726" fill="#64748b" font-size="8" text-anchor="middle">raw/ (原始) → wiki/ (编译) 单向</text>
  <text x="560" y="744" fill="#475569" font-size="8" text-anchor="middle">查询只读 wiki/ · 每个声明溯源到 raw/</text>
  <text x="560" y="758" fill="#7c3aed" font-size="8" text-anchor="middle">⬤ 编译红利：token 节省 ~99%</text>

  <!-- Law 3 -->
  <rect x="745" y="662" width="310" height="105" rx="10" fill="#0f172a"/>
  <rect x="745" y="662" width="310" height="105" rx="10" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.2"/>
  <text x="900" y="688" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">第三定律：熵增定律</text>
  <text x="900" y="708" fill="#94a3b8" font-size="9" text-anchor="middle">知识系统必然趋向混乱</text>
  <text x="900" y="726" fill="#64748b" font-size="8" text-anchor="middle">维护成本必须趋近于零</text>
  <text x="900" y="744" fill="#475569" font-size="8" text-anchor="middle">AI 自动化维护 · 定期 /lint 反熵</text>
  <text x="900" y="758" fill="#166534" font-size="8" text-anchor="middle">⬤ 手工维护 → 系统必然死亡</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="65" y="790" width="990" height="24" rx="4" fill="rgba(30,41,59,0.5)"/>
  <text x="560" y="806" fill="#64748b" font-size="8" text-anchor="middle">
    I/O 层: #22d3ee (Cyan) | LifeOps: #34d399 (Emerald) | Knowledge: #a78bfa (Violet) | Kernel: #fbbf24 (Amber) | 数据流 → /triage → /wiki-compile → /query → /lint
  </text>
</svg>
