<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 820">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="570" y="36" fill="white" font-size="16" font-weight="700" text-anchor="middle">熵增与反熵 — 知识系统的熵动力学</text>
  <text x="570" y="54" fill="#64748b" font-size="9" text-anchor="middle">Entropy &amp; Anti-Entropy: The Thermodynamics of Knowledge Systems</text>

  <!-- ============================================================ -->
  <!-- SECTION 1: Entropy Sources (Top) -->
  <!-- ============================================================ -->
  <rect x="18" y="66" width="1104" height="144" rx="10" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="6,4"/>
  <text x="36" y="84" fill="#94a3b8" font-size="9" font-weight="600">六大熵增来源</text>

  <!-- Node 1: 信息涌入 -->
  <rect x="73" y="100" width="135" height="48" rx="6" fill="#0f172a"/>
  <rect x="73" y="100" width="135" height="48" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="140" y="120" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">信息涌入</text>
  <text x="140" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">新资料未分类</text>

  <!-- Node 2: 链接腐化 -->
  <rect x="244" y="100" width="135" height="48" rx="6" fill="#0f172a"/>
  <rect x="244" y="100" width="135" height="48" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="311" y="120" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">链接腐化</text>
  <text x="311" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">wikilinks 断裂</text>

  <!-- Node 3: 内容过时 -->
  <rect x="415" y="100" width="135" height="48" rx="6" fill="#0f172a"/>
  <rect x="415" y="100" width="135" height="48" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="482" y="120" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">内容过时</text>
  <text x="482" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">半衰期到期</text>

  <!-- Node 4: 信息重复 -->
  <rect x="586" y="100" width="135" height="48" rx="6" fill="#0f172a"/>
  <rect x="586" y="100" width="135" height="48" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="653" y="120" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">信息重复</text>
  <text x="653" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">多版本不一致</text>

  <!-- Node 5: 孤立页面 -->
  <rect x="757" y="100" width="135" height="48" rx="6" fill="#0f172a"/>
  <rect x="757" y="100" width="135" height="48" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="824" y="120" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">孤立页面</text>
  <text x="824" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">未被 MOC 引用</text>

  <!-- Node 6: 结构漂移 -->
  <rect x="928" y="100" width="135" height="48" rx="6" fill="#0f172a"/>
  <rect x="928" y="100" width="135" height="48" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="995" y="120" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">结构漂移</text>
  <text x="995" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">绕过标准流程</text>

  <!-- Down arrows from each node to accumulator -->
  <line x1="140" y1="148" x2="140" y2="178" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-rose)"/>
  <line x1="311" y1="148" x2="311" y2="178" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-rose)"/>
  <line x1="482" y1="148" x2="482" y2="178" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-rose)"/>
  <line x1="653" y1="148" x2="653" y2="178" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-rose)"/>
  <line x1="824" y1="148" x2="824" y2="178" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-rose)"/>
  <line x1="995" y1="148" x2="995" y2="178" stroke="#fb7185" stroke-width="1" marker-end="url(#arrow-rose)"/>

  <!-- Entropy accumulator bar -->
  <rect x="40" y="178" width="1060" height="24" rx="4" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="570" y="194" fill="#fb7185" font-size="9" font-weight="500" text-anchor="middle">知识系统 — 持续承受熵增压力</text>

  <!-- ============================================================ -->
  <!-- SECTION 2: Entropy / Anti-Entropy Cycle (Middle) -->
  <!-- ============================================================ -->

  <!-- Region boundary -->
  <rect x="18" y="220" width="1104" height="340" rx="10" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="6,4"/>

  <!-- Y-axis label (rotated) -->
  <text x="44" y="390" fill="#64748b" font-size="9" font-weight="500" text-anchor="middle" transform="rotate(-90, 44, 390)">系统秩序度</text>

  <!-- The Entropy Wave Curve (cubic bezier) -->
  <!-- Rising phase: low order → peak (high entropy) -->
  <!-- Falling phase: peak → low order (anti-entropy recovery) -->
  <path d="M 80,520 C 180,520 240,280 360,270 C 480,260 560,520 640,520" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Glow under the curve -->
  <path d="M 80,520 C 180,520 240,280 360,270 C 480,260 560,520 640,520" fill="none" stroke="#22d3ee" stroke-width="6" stroke-opacity="0.15" stroke-linecap="round"/>

  <!-- Phase labels along the curve -->
  <!-- Rising phase annotation -->
  <text x="210" y="370" fill="#fb7185" font-size="9" font-weight="600" text-anchor="middle">熵增阶段</text>
  <text x="210" y="384" fill="#94a3b8" font-size="7" text-anchor="middle">信息涌入 · 链接腐化 · 内容过时</text>

  <!-- Peak annotation -->
  <rect x="370" y="230" width="72" height="18" rx="4" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1"/>
  <text x="406" y="244" fill="#fb7185" font-size="8" font-weight="600" text-anchor="middle">高熵态</text>

  <text x="406" y="254" fill="#94a3b8" font-size="7" text-anchor="middle">混乱 · 不可检索</text>

  <!-- Falling phase annotation -->
  <text x="500" y="370" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle">反熵阶段</text>
  <text x="500" y="384" fill="#94a3b8" font-size="7" text-anchor="middle">编译降熵 · lint修复 · 归档清理</text>

  <!-- Start/End state labels -->
  <text x="68" y="540" fill="#64748b" font-size="7" text-anchor="middle">高秩序</text>
  <text x="68" y="552" fill="#64748b" font-size="7" text-anchor="middle">低熵</text>

  <text x="652" y="540" fill="#64748b" font-size="7" text-anchor="middle">高秩序</text>
  <text x="652" y="552" fill="#64748b" font-size="7" text-anchor="middle">低熵</text>

  <!-- Time arrow along bottom -->
  <line x1="80" y1="558" x2="640" y2="558" stroke="#475569" stroke-width="1" marker-end="url(#arrow-slate)"/>
  <text x="360" y="572" fill="#475569" font-size="8" text-anchor="middle">时间 →</text>

  <!-- Anti-Entropy Operations (right side cards) -->
  <!-- Card 1: /triage -->
  <rect x="710" y="235" width="380" height="52" rx="6" fill="#0f172a"/>
  <rect x="710" y="235" width="380" height="52" rx="6" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="718" y="242" width="20" height="20" rx="4" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="728" y="256" fill="#22d3ee" font-size="9" font-weight="700" text-anchor="middle">1</text>
  <text x="750" y="256" fill="white" font-size="11" font-weight="600">/triage 分拣</text>
  <text x="750" y="274" fill="#94a3b8" font-size="8">入口预防</text>
  <text x="900" y="256" fill="#64748b" font-size="8">成本: 低</text>
  <text x="900" y="274" fill="#475569" font-size="7">效果: 预防级 — 阻止熵进入核心区</text>
  <text x="1000" y="256" fill="#22d3ee" font-size="9" font-weight="600">每日</text>

  <!-- Arrow from Card 1 to curve -->
  <path d="M 710,261 L 500,340" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)"/>

  <!-- Card 2: /wiki-compile -->
  <rect x="710" y="301" width="380" height="52" rx="6" fill="#0f172a"/>
  <rect x="710" y="301" width="380" height="52" rx="6" fill="rgba(76,29,149,0.25)" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="718" y="308" width="20" height="20" rx="4" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="728" y="322" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">2</text>
  <text x="750" y="322" fill="white" font-size="11" font-weight="600">/wiki-compile 编译</text>
  <text x="750" y="340" fill="#94a3b8" font-size="8">结构降熵</text>
  <text x="900" y="322" fill="#64748b" font-size="8">成本: 中</text>
  <text x="900" y="340" fill="#475569" font-size="7">效果: 结构级 — 高熵 raw/ → 低熵 wiki/</text>
  <text x="1000" y="322" fill="#a78bfa" font-size="9" font-weight="600">每周</text>

  <!-- Arrow from Card 2 to curve -->
  <path d="M 710,327 L 520,380" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-violet)"/>

  <!-- Card 3: /lint 扫描 -->
  <rect x="710" y="367" width="380" height="52" rx="6" fill="#0f172a"/>
  <rect x="710" y="367" width="380" height="52" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="718" y="374" width="20" height="20" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="728" y="388" fill="#fbbf24" font-size="9" font-weight="700" text-anchor="middle">3</text>
  <text x="750" y="388" fill="white" font-size="11" font-weight="600">/lint 扫描</text>
  <text x="750" y="406" fill="#94a3b8" font-size="8">诊断检测</text>
  <text x="900" y="388" fill="#64748b" font-size="8">成本: 中</text>
  <text x="900" y="406" fill="#475569" font-size="7">效果: 诊断级 — 发现已产生的熵损</text>
  <text x="1000" y="388" fill="#fbbf24" font-size="9" font-weight="600">每周</text>

  <!-- Arrow from Card 3 to curve -->
  <path d="M 710,393 L 540,430" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-amber)"/>

  <!-- Card 4: /lint 修复 -->
  <rect x="710" y="433" width="380" height="52" rx="6" fill="#0f172a"/>
  <rect x="710" y="433" width="380" height="52" rx="6" fill="rgba(6,78,59,0.25)" stroke="#34d399" stroke-width="1.5"/>
  <rect x="718" y="440" width="20" height="20" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.8"/>
  <text x="728" y="454" fill="#34d399" font-size="9" font-weight="700" text-anchor="middle">4</text>
  <text x="750" y="454" fill="white" font-size="11" font-weight="600">/lint 修复</text>
  <text x="750" y="472" fill="#94a3b8" font-size="8">精准修复</text>
  <text x="900" y="454" fill="#64748b" font-size="8">成本: 低 → 高</text>
  <text x="900" y="472" fill="#475569" font-size="7">效果: 治疗级 — 修复具体熵损</text>
  <text x="1000" y="454" fill="#34d399" font-size="9" font-weight="600">按需</text>

  <!-- Arrow from Card 4 to curve -->
  <path d="M 710,459 L 560,480" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-emerald)"/>

  <!-- Label for the anti-entropy arrows -->
  <rect x="640" y="248" width="48" height="14" rx="3" fill="#0f172a"/>
  <text x="664" y="258" fill="#475569" font-size="7" font-weight="500" text-anchor="middle">反熵</text>
  <rect x="640" y="380" width="48" height="14" rx="3" fill="#0f172a"/>
  <text x="664" y="390" fill="#475569" font-size="7" font-weight="500" text-anchor="middle">反熵</text>

  <!-- Feedback loop annotation (curve returning to start) -->
  <path d="M 640,520 C 660,540 680,560 680,570 L 80,570 C 60,570 40,550 40,530" fill="none" stroke="#475569" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="660" y="580" fill="#475569" font-size="7">持续循环</text>

  <!-- ============================================================ -->
  <!-- SECTION 3: Three-Level Metabolism (Bottom) -->
  <!-- ============================================================ -->
  <rect x="18" y="570" width="1104" height="208" rx="10" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="6,4"/>
  <text x="36" y="592" fill="#94a3b8" font-size="9" font-weight="600">三级代谢机制 — 时间尺度的反熵节律</text>

  <!-- Metabolism Card 1: 日代谢 -->
  <rect x="55" y="608" width="310" height="96" rx="8" fill="#0f172a"/>
  <rect x="55" y="608" width="310" height="96" rx="8" fill="rgba(8,51,68,0.25)" stroke="#22d3ee" stroke-width="1.5"/>

  <rect x="65" y="616" width="56" height="20" rx="4" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="93" y="631" fill="#22d3ee" font-size="9" font-weight="700" text-anchor="middle">日代谢</text>
  <text x="130" y="631" fill="#64748b" font-size="8">Daily Metabolism</text>

  <text x="75" y="654" fill="white" font-size="10" font-weight="600">Inbox 清零</text>
  <text x="75" y="672" fill="#94a3b8" font-size="8">/triage 路由分拣 — 每日一次</text>
  <text x="75" y="690" fill="#64748b" font-size="7">阻止信息在入口处腐烂</text>

  <rect x="260" y="656" width="90" height="18" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="0.5"/>
  <text x="305" y="669" fill="#22d3ee" font-size="8" font-weight="600" text-anchor="middle">入口反熵</text>

  <!-- Arrow 1→2 -->
  <line x1="365" y1="656" x2="393" y2="656" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Metabolism Card 2: 周代谢 -->
  <rect x="415" y="608" width="310" height="96" rx="8" fill="#0f172a"/>
  <rect x="415" y="608" width="310" height="96" rx="8" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5"/>

  <rect x="425" y="616" width="56" height="20" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="453" y="631" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">周代谢</text>
  <text x="490" y="631" fill="#64748b" font-size="8">Weekly Metabolism</text>

  <text x="435" y="654" fill="white" font-size="10" font-weight="600">知识炼化</text>
  <text x="435" y="672" fill="#94a3b8" font-size="8">/wiki-compile — 每周编译 raw/ → wiki/</text>
  <text x="435" y="690" fill="#64748b" font-size="7">将本周积累的 reference 转化为 evergreen</text>

  <rect x="610" y="656" width="90" height="18" rx="4" fill="rgba(76,29,149,0.25)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="655" y="669" fill="#a78bfa" font-size="8" font-weight="600" text-anchor="middle">结构降熵</text>

  <!-- Arrow 2→3 -->
  <line x1="725" y1="656" x2="753" y2="656" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Metabolism Card 3: 月代谢 -->
  <rect x="775" y="608" width="310" height="96" rx="8" fill="#0f172a"/>
  <rect x="775" y="608" width="310" height="96" rx="8" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1.5"/>

  <rect x="785" y="616" width="56" height="20" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="813" y="631" fill="#fbbf24" font-size="9" font-weight="700" text-anchor="middle">月代谢</text>
  <text x="850" y="631" fill="#64748b" font-size="8">Monthly Metabolism</text>

  <text x="795" y="654" fill="white" font-size="10" font-weight="600">系统减脂</text>
  <text x="795" y="672" fill="#94a3b8" font-size="8">全库深度清理 — 过期归档 · 合并重复</text>
  <text x="795" y="690" fill="#64748b" font-size="7">防止信息肥胖 — 信息量增长但知识密度下降</text>

  <rect x="980" y="656" width="90" height="18" rx="4" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="1025" y="669" fill="#fbbf24" font-size="8" font-weight="600" text-anchor="middle">深度反熵</text>

  <!-- Bottom principle text -->
  <text x="570" y="740" fill="#64748b" font-size="8" text-anchor="middle">预防优于治疗 · 自动化是唯一可持续的反熵手段 · 节律性而非一次性</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="730" y="752" width="370" height="34" rx="6" fill="rgba(30,41,59,0.3)" stroke="#334155" stroke-width="0.8"/>

  <text x="746" y="773" fill="#64748b" font-size="7" font-weight="600">图例:</text>

  <rect x="786" y="761" width="12" height="10" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="802" y="771" fill="#22d3ee" font-size="7">预防</text>

  <rect x="842" y="761" width="12" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="858" y="771" fill="#a78bfa" font-size="7">降熵</text>

  <rect x="898" y="761" width="12" height="10" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="914" y="771" fill="#fbbf24" font-size="7">检测</text>

  <rect x="954" y="761" width="12" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="0.8"/>
  <text x="970" y="771" fill="#34d399" font-size="7">修复</text>

  <rect x="1010" y="761" width="12" height="10" rx="2" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="1026" y="771" fill="#fb7185" font-size="7">熵源</text>
</svg>
